<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GENEXXO Vision</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; }
  canvas { position:absolute; inset:0; display:block; }

  #ui {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    justify-content:center; align-items:center;
    pointer-events:none;
  }

  #hub {
    text-align:center;
    opacity:0;
    transform: scale(0.75) translateY(10px);
    transition: opacity 2.8s ease, transform 2.8s cubic-bezier(0.16,1,0.3,1);
  }
  #hub.show { opacity:1; transform:scale(1) translateY(0); }

  #hub img {
    width: clamp(150px, 18vw, 280px);
    height: auto;
    display: block;
    margin: 0 auto;
    animation: logopulse 4s ease-in-out infinite;
  }

  @keyframes logopulse {
    0%,100% { filter: drop-shadow(0 0 6px rgba(236,28,36,0.35)) drop-shadow(0 0 18px rgba(27,117,187,0.25)) brightness(1.0); }
    50%      { filter: drop-shadow(0 0 12px rgba(236,28,36,0.55)) drop-shadow(0 0 32px rgba(27,117,187,0.45)) brightness(1.07); }
  }

  #hub-sub {
    font-family:'Share Tech Mono', monospace;
    font-size: clamp(11px, 1.2vw, 16px);
    letter-spacing: 0.65em;
    color: rgba(220,200,255,0.75);
    text-transform: uppercase;
    margin-top: 16px;
    text-shadow: 0 0 18px rgba(180,140,255,0.5), 0 0 40px rgba(140,100,240,0.3);
    opacity: 0;
    transition: opacity 2s ease 1.8s;
  }
  #hub.show #hub-sub { opacity:1; }

  .corner.br { bottom:16px; right:16px; border-bottom:1px solid #b48cdc; border-right:1px solid #b48cdc; }
  #fade-overlay {
    position:absolute; inset:0;
    background:#000;
    z-index:50;
    opacity:0;
    pointer-events:none;
    transition: opacity 2s ease;
  }
  #fade-overlay.fade { opacity:1; }
</style>
</head>

let xxReady = false;
xxImg.onload = () => { xxReady = true; };

// ── PALETTE ──────────────────────────────────────────────────────────────────
const PAL = [
  '#ec1c24','#b52060','#7b2fa0','#4a3ab8',
  '#1b75bb','#2a8fcc','#c03070','#8a35a0',
  '#5540c0','#3060c8','#a02878','#6038b0'
];

// ── PHASE TIMING ─────────────────────────────────────────────────────────────
const PT = { HUB:3, DEPLOY:6, STAR:20 };
// ── LOOP TIMING: full cycle with 5s hold at constellation + 2s fade ────────
const FADE_START = PT.STAR + 16;  // 36s: all labels in by ~31s, then 5s hold
const RESET_AT   = FADE_START + 2; // 38s: fade finished, restart the cycle

// ── SECTORS ──────────────────────────────────────────────────────────────────
const SECTORS = [
  'FinanceXX','FashionXX','SurfXX','ClimbXX','TravelXX',
  'SportsXX','FoodXX','TechXX','MusicXX','ArtXX',
  'HealthXX','FitnessXX','AutoXX','GardenXX','LegalXX',
  'YogaXX','WellnessXX','GamingXX','PetXX','WeddingXX',
  'CryptoXX','BeautyXX','FilmXX','DesignXX'
];

// ── STATE ────────────────────────────────────────────────────────────────────
let t0, phase, novaFired;
let stars, dust, burst, nodes, conns;

// Named inner sector count
const NAMED = SECTORS.length;  // 24

function init() {
  cancelAnimationFrame(raf);
  t0 = Date.now(); phase='SPACE'; novaFired=false;
  hubEl.classList.remove('show');

  // Stars
  stars = Array.from({length:300}, () => ({
    x:Math.random()*W, y:Math.random()*H,
    r:Math.random()*1.3+0.15,
    base:Math.random()*0.5+0.12,
    tw:Math.random()*Math.PI*2,
    twV:0.008+Math.random()*0.02
  }));

  // Ambient dust — slow drifting motes
  dust = Array.from({length:60}, () => ({
    x:Math.random()*W, y:Math.random()*H,
    vx:(Math.random()-0.5)*0.25, vy:(Math.random()-0.5)*0.25,
    r:Math.random()*1.5+0.4,
    a:Math.random()*0.12+0.02,
    c:PAL[Math.floor(Math.random()*PAL.length)]
  }));

  burst = [];

  // ── UNIFIED NODE FIELD ────────────────────────────────────────────────────
  // One array: 24 named inner gateways + 60 unnamed expansion nodes.
  // Size shrinks continuously with distance from centre. One cobweb connects all.

  const outerBound = Math.sqrt(W*W+H*H)*0.72;  // reaches canvas corners
  const innerBound = Math.min(W,H)*0.40;        // where expansion begins

  // Named inner gateways (fly out from hub)
  const perRing = Math.ceil(NAMED/3);
  const namedNodes = SECTORS.map((name,i) => {
    const ring=i%3, pos=Math.floor(i/3);
    const rings=[0.26,0.36,0.46], offsets=[0,0.4,0.78];
    const minPx=[165,225,285];  // floors tuned for embedded aspect ratio
    const R=Math.max(minPx[ring], Math.min(W,H)*(rings[ring]+(Math.random()-0.5)*0.03));
    const angle=(pos/perRing)*Math.PI*2-Math.PI/2+offsets[ring]+(Math.random()-0.5)*0.22;
    return {
      name,
      tx:CX+Math.cos(angle)*R, ty:CY+Math.sin(angle)*R,
      x:CX, y:CY,                          // start at hub, fly outward
      showAt: PT.DEPLOY+(i/NAMED)*11,
      labelDelay: Math.random()*8,
      named: true,
      alive:false, settled:false,
      pulse:Math.random()*Math.PI*2, pulseV:0.022+Math.random()*0.018,
      c:PAL[i%PAL.length],
      sz:22+Math.random()*8,
      maxAlpha:1,
      alpha:0
    };
  });

  // Expansion nodes radiate evenly from each named gateway outward.
  // Each gateway spawns two rings of evenly-spread expansion nodes.
  // Nodes start AT their parent gateway and drift outward to their target.
  // Size shrinks continuously with distance from the parent gateway.

  const RING1_N   = 5;   // nodes in inner ring per gateway
  const RING1_R   = () => 85 + Math.random()*35;
  const RING2_N   = 6;   // nodes in outer ring per gateway
  const RING2_R   = () => 180 + Math.random()*55;

  const expandNodes = namedNodes.flatMap((src, si) => {
    // Base angle offset per gateway so rings are rotated uniquely
    const baseAngle = Math.random() * Math.PI * 2;

    // Inner ring
    const ring1 = Array.from({length: RING1_N}, (_, j) => {
      const angle = baseAngle + (j / RING1_N) * Math.PI * 2 + (Math.random()-0.5)*0.18;
      const R     = RING1_R();
      const tx    = src.tx + Math.cos(angle) * R;
      const ty    = src.ty + Math.sin(angle) * R;
      const sz    = src.sz * (0.55 + Math.random()*0.08);
      return {
        name: null, named: false,
        tx, ty,
        x: src.tx, y: src.ty,       // start at parent gateway
        showAt: src.showAt + 1.2 + Math.random()*2.5,
        labelDelay: 0,
        alive: false, settled: false,
        pulse: Math.random()*Math.PI*2, pulseV: 0.014+Math.random()*0.012,
        c: src.c,                    // inherit parent colour — inner ring stays brand palette
        sz,
        maxAlpha: 0.58 + Math.random()*0.18,
        alpha: 0, srcIdx: si
      };
    });

    // Outer ring — offset angle by half-step so they alternate with inner
    const ring2 = Array.from({length: RING2_N}, (_, j) => {
      const angle = baseAngle + Math.PI/RING2_N + (j/RING2_N)*Math.PI*2 + (Math.random()-0.5)*0.18;
      const R     = RING2_R();
      const tx    = src.tx + Math.cos(angle) * R;
      const ty    = src.ty + Math.sin(angle) * R;
      const sz    = src.sz * (0.30 + Math.random()*0.07);
      return {
        name: null, named: false,
        tx, ty,
        x: src.tx, y: src.ty,       // start at parent gateway
        showAt: src.showAt + 3.0 + Math.random()*3.5,
        labelDelay: 0,
        alive: false, settled: false,
        pulse: Math.random()*Math.PI*2, pulseV: 0.010+Math.random()*0.010,
        c: ['#c8d8f0','#b8cce8','#d4c8f8','#c0d4f4','#e0d0ff','#b4cce0','#d8c4f0','#c4d8ee','#e4d8ff','#bcd0ec'][Math.floor(Math.random()*10)],  // lighter silvers/pale blues
        sz,
        maxAlpha: 0.38 + Math.random()*0.16,
        alpha: 0, srcIdx: si
      };
    });

    return [...ring1, ...ring2];
  });

  nodes = [...namedNodes, ...expandNodes];

  // ── UNIFIED COBWEB — all nodes, nearest 3 neighbours ─────────────────────
  conns=[];
  nodes.forEach((a,i) => {
    nodes.map((b,j) => ({j,d:Math.hypot(a.tx-b.tx,a.ty-b.ty)}))
      .filter(o=>o.j!==i).sort((p,q)=>p.d-q.d).slice(0,3)
      .forEach(({j}) => {
        if(!conns.find(c=>(c.a===j&&c.b===i)||(c.a===i&&c.b===j)))
          conns.push({a:i,b:j});
      });
  });

  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);
  raf=requestAnimationFrame(frame);
}

// ── DRAW XX NODE ─────────────────────────────────────────────────────────────
function drawNode(x, y, sz, color, alpha, glow) {
  if (alpha<=0.005) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  if (glow) {
    ctx.shadowColor = color;
    ctx.shadowBlur  = sz * 1.6;
  }
  if (xxReady) {
    const iw = sz*1.8, ih = sz*1.4;
    ctx.drawImage(xxImg, x-iw/2, y-ih/2, iw, ih);
  } else {
    // Fallback: geometric XX
    ctx.strokeStyle=color; ctx.lineWidth=Math.max(1,sz*0.17);
    ctx.lineCap='square';
    const h=sz*0.48, g=sz*0.38;
    ctx.beginPath();
    ctx.moveTo(x-g-h,y-h); ctx.lineTo(x-g+h,y+h);
    ctx.moveTo(x-g+h,y-h); ctx.lineTo(x-g-h,y+h);
    ctx.moveTo(x+g-h,y-h); ctx.lineTo(x+g+h,y+h);
    ctx.moveTo(x+g+h,y-h); ctx.lineTo(x+g-h,y+h);
    ctx.stroke();
  }
  ctx.restore();
}

// ── HUB AURA ────────────────────────────────────────────────────────────────
function drawHubAura(el, hubA) {
  if (hubA<=0) return;
  const pm=0.8+0.2*Math.sin(el*2.0);

  // Radial glow — cool blue-white centre, fading outward
  const grd=ctx.createRadialGradient(CX,CY,0,CX,CY,130*pm);
  grd.addColorStop(0,   `rgba(220,230,255,${0.18*hubA})`);
  grd.addColorStop(0.25,`rgba(160,200,255,${0.10*hubA})`);
  grd.addColorStop(0.6, `rgba(100,140,220,${0.06*hubA})`);
  grd.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle=grd;
  ctx.beginPath(); ctx.arc(CX,CY,130*pm,0,Math.PI*2); ctx.fill();

  // Pulsing rings — white/pale-blue tones, each slightly different
  const ringCols = [
    'rgba(255,255,255,1)',      // r=4 outermost — pure white
    'rgba(200,225,255,1)',      // r=3 pale blue-white
    'rgba(170,210,255,1)',      // r=2 light blue
    'rgba(140,190,240,1)',      // r=1 innermost — soft blue
  ];
  for (let r=4;r>=1;r--) {
    const rad=48+r*16+Math.sin(el*1.6+r)*4;
    const col=ringCols[4-r];
    ctx.save();
    ctx.globalAlpha=hubA*(0.09/r)*pm;
    ctx.strokeStyle=col;
    ctx.lineWidth=0.7;
    ctx.shadowColor=col;
    ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(CX,CY,rad,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

// ── MAIN LOOP ────────────────────────────────────────────────────────────────
function frame() {
  const el=(Date.now()-t0)/1000;
  const prev=phase;

  if      (el<PT.HUB)    phase='SPACE';
  else if (el<PT.DEPLOY)  phase='HUB';
  else if (el<PT.STAR)    phase='DEPLOY';
  else                    phase='STAR';


  if (phase==='HUB' && !novaFired) {
    novaFired=true;
    hubEl.classList.add('show');
    burst=Array.from({length:200},()=>{
      const a=Math.random()*Math.PI*2, s=4+Math.random()*14;
      return {x:CX,y:CY,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
              life:1,decay:0.006+Math.random()*0.016,
              sz:0.5+Math.random()*3,
              c:PAL[Math.floor(Math.random()*PAL.length)]};
    });
  }

  // ── Clear ──
  ctx.fillStyle='rgba(0,0,0,0.14)';
  ctx.fillRect(0,0,W,H);

  // ── Stars ──
  stars.forEach(s=>{
    s.tw+=s.twV;
    ctx.save(); ctx.globalAlpha=s.base*(0.6+0.4*Math.sin(s.tw));
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // ── Ambient dust ──
  dust.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    ctx.save();
    ctx.globalAlpha=p.a;
    ctx.fillStyle=p.c;
    ctx.shadowColor=p.c; ctx.shadowBlur=4;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // ── Hub aura ──
  const hubA = phase==='HUB' ? Math.min(1,(el-PT.HUB)/2.5)
             : (phase==='DEPLOY'||phase==='STAR') ? 1 : 0;
  drawHubAura(el,hubA);

  // ── Burst ──
  if (burst.length) {
    // Flash
    if (phase==='HUB') {
      const pct=Math.min(1,(el-PT.HUB)/2.5);
      const fa=Math.max(0,0.45*(1-pct));
      if (fa>0) {
        const gr=ctx.createRadialGradient(CX,CY,0,CX,CY,160+pct*350);
        gr.addColorStop(0, `rgba(255,240,255,${fa})`);
        gr.addColorStop(0.15,`rgba(180,100,240,${fa*0.5})`);
        gr.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
      }
    }
    burst.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      p.vx*=0.97; p.vy*=0.97;
      p.life-=p.decay;
      if(p.life>0) {
        ctx.save();
        ctx.globalAlpha=Math.pow(p.life,1.3)*0.8;
        ctx.fillStyle=p.c; ctx.shadowColor=p.c; ctx.shadowBlur=6;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
    });
  }

  // ── Unified node render — one pass, all 84 nodes ────────────────────────
  if (phase==='DEPLOY'||phase==='STAR') {

    // 1. Connections first (drawn behind nodes)
    conns.forEach(c=>{
      const a=nodes[c.a], b=nodes[c.b];
      if(!a.alive||!b.alive) return;
      const bothNamed   = a.named && b.named;
      const eitherNamed = a.named || b.named;
      const pulse = 0.45 + 0.55*Math.sin((a.pulse+b.pulse)*0.5);
      const ca = Math.min(a.alpha,b.alpha)
               * (bothNamed ? 0.32 : eitherNamed ? 0.24 : 0.18)
               * pulse;
      if(ca<0.008) return;
      ctx.save();
      ctx.globalAlpha=ca;
      ctx.strokeStyle=a.c;
      ctx.lineWidth = bothNamed ? 0.75 : eitherNamed ? 0.55 : 0.40;
      ctx.shadowColor = a.c;
      ctx.shadowBlur  = bothNamed ? 4 : eitherNamed ? 3 : 1.5;
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      ctx.restore();
    });

    // Hub spokes (named inner nodes only)
    nodes.forEach(n=>{
      if(!n.named||!n.settled) return;
      ctx.save();
      ctx.globalAlpha=n.alpha*0.07*hubA;
      ctx.strokeStyle=n.c; ctx.lineWidth=0.4;
      ctx.beginPath(); ctx.moveTo(n.x,n.y); ctx.lineTo(CX,CY); ctx.stroke();
      ctx.restore();
    });

    // 2. Nodes — one loop, behaviour driven by n.named flag
    nodes.forEach(n=>{
      if(el<n.showAt) return;
      n.alive=true;
      const age=el-n.showAt;
      n.pulse+=n.pulseV;

      // Named: fly from hub. Expansion: drift in from outer void.
      const lerpSpeed = n.named ? 0.06 : 0.032;
      n.x+=(n.tx-n.x)*lerpSpeed;
      n.y+=(n.ty-n.y)*lerpSpeed;
      if(Math.abs(n.x-n.tx)<1.5&&Math.abs(n.y-n.ty)<1.5) n.settled=true;

      n.alpha = Math.min(n.maxAlpha, age*(n.named?1.1:0.55));
      const pm = n.settled ? (0.78+0.22*Math.sin(n.pulse)) : 1;
      const ga = n.alpha * (n.settled ? (0.6+0.4*Math.sin(n.pulse)) : 0.85);

      drawNode(n.x, n.y, n.sz*pm, n.c, ga, n.named);  // only named nodes glow

      // Labels rendered in top-layer pass below
    });
  }

  // STAR: soft ambient bloom on named nodes only
  if (phase==='STAR') {
    nodes.forEach(n=>{
      if(!n.named||!n.settled||n.alpha<0.7) return;
      const ga=(0.025+0.015*Math.sin(n.pulse*1.2))*n.alpha;
      const grd=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.sz*3);
      grd.addColorStop(0,n.c+'44'); grd.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grd;
      ctx.save(); ctx.globalAlpha=ga;
      ctx.fillRect(n.x-n.sz*3.5,n.y-n.sz*3.5,n.sz*7,n.sz*7);
      ctx.restore();
    });
  }

  // ── Labels — top layer, last draw call, over everything ─────────────────────
  if (phase==='STAR') {
    ctx.textAlign='center';
    nodes.forEach(n=>{
      if(!n.named||!n.settled) return;
      const starAge = el - PT.STAR - n.labelDelay;
      const labelA  = Math.max(0, Math.min(1, starAge/2.5));
      if(labelA<=0) return;
      // Radial label positioning — tight to node, smaller, edge-safe for mobile
      const dx=n.x-CX, dy=n.y-CY;
      const mag=Math.hypot(dx,dy)||1;
      let nx=dx/mag, ny=dy/mag;
      const lDist=n.sz*0.9+5;
      let lx=n.x+nx*lDist;
      let ly=n.y+ny*lDist+3;
      // Edge safety: if label would clip canvas edge, flip direction inward
      const edgePad=60;
      if(lx<edgePad||lx>W-edgePad||ly<edgePad||ly>H-edgePad){
        nx=-nx; ny=-ny;
        lx=n.x+nx*lDist;
        ly=n.y+ny*lDist+3;
      }
      ctx.save();
      ctx.globalAlpha = labelA * Math.min(1, n.alpha * 1.1);
      ctx.fillStyle='rgba(230,230,245,0.95)';
      ctx.font=`300 ${Math.max(8,n.sz*0.48)}px 'IBM Plex Mono', ui-monospace, monospace`;
      ctx.textAlign = nx>0.35 ? 'left' : nx<-0.35 ? 'right' : 'center';
      ctx.shadowColor='rgba(255,255,255,0.18)';
      ctx.shadowBlur=2;
      ctx.fillText(n.name, lx, ly);
      ctx.restore();
    });
  }

  // ── Loop: trigger fade at FADE_START, reset at RESET_AT ────────────────────
  if (el >= FADE_START && el < RESET_AT) {
    if (!fadeEl.classList.contains('fade')) fadeEl.classList.add('fade');
  }
  if (el >= RESET_AT) {
    fadeEl.classList.remove('fade');  // overlay fades back to transparent over new cycle
    init();
    return;
  }

  raf=requestAnimationFrame(frame);
}

init();
</script>
</body>
